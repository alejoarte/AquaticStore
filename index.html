<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaticStore</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="./index.html" class="brand">AquaticStore</a>

            <nav class="nav-desktop">
                <button id="all-products" class="btn-nav btn-category active">Todos los productos</button>
                <button id="googles" class="btn-nav btn-category">Gafas</button>
                <button id="fastkins" class="btn-nav btn-category">Trajes de competición</button>
                <button id="training-items" class="btn-nav btn-category">Implementos</button>
            </nav>

            <div class="header-actions">
                <a href="./cart.html" class="nav-cart">
                    <i class="bi bi-cart3"></i>
                    Carrito
                    <span id="number-items" class="number-items">0</span>
                </a>
                <button id="open-menu" class="nav-toggle" aria-label="Abrir menú">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </div>

        <nav id="mobile-nav" class="nav-mobile">
            <button id="close-menu" class="nav-mobile-close" aria-label="Cerrar menú">
                <i class="bi bi-x-lg"></i>
            </button>
            <button id="all-products-mobile" class="btn-nav btn-category-mobile active" data-target="all-products">Todos los productos</button>
            <button id="googles-mobile" class="btn-nav btn-category-mobile" data-target="googles">Gafas</button>
            <button id="fastkins-mobile" class="btn-nav btn-category-mobile" data-target="fastkins">Trajes de competición</button>
            <button id="training-items-mobile" class="btn-nav btn-category-mobile" data-target="training-items">Implementos</button>
            <a href="./cart.html" class="btn-nav nav-cart-mobile">
                <i class="bi bi-cart3"></i> Carrito
            </a>
        </nav>
    </header>

    <main class="page">
        <section class="hero">
            <h1 class="hero-title">AquaticStore</h1>
            <p class="hero-subtitle">Equipamiento para nadadores</p>
        </section>

        <section class="catalog">
            <h2 id="main-title" class="main-title">Todos los productos</h2>
            <div id="products-container" class="products-container"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>@AquaticStore</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/menu.js"></script>
</body>
</html>
