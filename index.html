<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AquaticStore — equipamiento profesional para nadadores">
    <meta name="theme-color" content="#0ea5e9">
    <title>AquaticStore</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%230ea5e9' d='M16 2C10 10 4 14 4 20a12 12 0 0 0 24 0c0-6-6-10-12-18z'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="./index.html" class="brand"><span class="brand-accent">Aquatic</span>Store</a>

            <nav class="nav-desktop">
                <button id="all-products" class="btn-nav btn-category active">Todos los productos</button>
                <button id="googles" class="btn-nav btn-category">Gafas</button>
                <button id="fastkins" class="btn-nav btn-category">Trajes de competición</button>
                <button id="training-items" class="btn-nav btn-category">Implementos</button>
            </nav>

            <div class="header-actions">
                <a href="./cart.html" class="nav-cart">
                    <i class="bi bi-cart3"></i>
                    Carrito
                    <span id="number-items" class="number-items">0</span>
                </a>
                <button id="open-menu" class="nav-toggle" aria-label="Abrir menú">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </div>

        <nav id="mobile-nav" class="nav-mobile">
            <button id="close-menu" class="nav-mobile-close" aria-label="Cerrar menú">
                <i class="bi bi-x-lg"></i>
            </button>
            <button id="all-products-mobile" class="btn-nav btn-category-mobile active" data-target="all-products">Todos los productos</button>
            <button id="googles-mobile" class="btn-nav btn-category-mobile" data-target="googles">Gafas</button>
            <button id="fastkins-mobile" class="btn-nav btn-category-mobile" data-target="fastkins">Trajes de competición</button>
            <button id="training-items-mobile" class="btn-nav btn-category-mobile" data-target="training-items">Implementos</button>
            <a href="./cart.html" class="btn-nav nav-cart-mobile">
                <i class="bi bi-cart3"></i> Carrito
            </a>
        </nav>
    </header>

    <main class="page">
        <section class="hero">
            <h1 class="hero-title"><span class="brand-accent">Aquatic</span>Store</h1>
            <p class="hero-subtitle">Gafas, trajes e implementos para entrenar y competir</p>
        </section>

        <section class="catalog">
            <div class="catalog-toolbar">
                <h2 id="main-title" class="main-title">Todos los productos</h2>
                <label class="catalog-sort" for="sort-products">
                    <span class="catalog-sort-label">Ordenar por</span>
                    <select id="sort-products" class="catalog-sort-select">
                        <option value="default">Predeterminado</option>
                        <option value="price-asc" selected>Precio: menor a mayor</option>
                        <option value="price-desc">Precio: mayor a menor</option>
                    </select>
                </label>
            </div>
            <div id="products-container" class="products-container"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="footer-brand">AquaticStore</p>
        <p class="footer-tagline">Equipamiento para nadadores</p>
        <div class="footer-social">
            <a href="https://www.instagram.com/_aquaticstore"
               class="footer-social-link"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Seguinos en Instagram">
                <i class="bi bi-instagram" aria-hidden="true"></i>
            </a>
        </div>
        <p class="footer-copy">&copy; 2026 AquaticStore</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/currency.js"></script>
    <script src="./js/discounts.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/menu.js"></script>
</body>
</html>
