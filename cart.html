<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AquaticStore — equipamiento profesional para nadadores">
    <meta name="theme-color" content="#0ea5e9">
    <title>Carrito — AquaticStore</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%230ea5e9' d='M16 2C10 10 4 14 4 20a12 12 0 0 0 24 0c0-6-6-10-12-18z'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="./index.html" class="brand"><span class="brand-accent">Aquatic</span>Store</a>

            <nav class="nav-desktop">
                <a href="./index.html" class="btn-nav btn-back">
                    <i class="bi bi-arrow-left"></i> Seguir Comprando
                </a>
            </nav>

            <div class="header-actions">
                <a href="./cart.html" class="nav-cart active">
                    <i class="bi bi-cart3"></i>
                    Carrito
                </a>
                <button id="open-menu" class="nav-toggle" aria-label="Abrir menú">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </div>

        <nav id="mobile-nav" class="nav-mobile">
            <button id="close-menu" class="nav-mobile-close" aria-label="Cerrar menú">
                <i class="bi bi-x-lg"></i>
            </button>
            <a href="./index.html" class="btn-nav btn-back-mobile">
                <i class="bi bi-arrow-left"></i> Seguir Comprando
            </a>
            <a href="./cart.html" class="btn-nav nav-cart-mobile active">
                <i class="bi bi-cart3"></i> Carrito
            </a>
        </nav>
    </header>

    <main class="page">
        <section class="cart-section">
            <h2 class="main-title">Carrito</h2>
            <div class="cart-container">
                <div id="empty-cart" class="empty-cart">
                    <i class="bi bi-cart-x empty-cart-icon"></i>
                    <p>Tu carrito está vacío.</p>
                </div>

                <div id="products-cart" class="products-cart disabled"></div>

                <div id="actions-cart" class="actions-cart disabled">
                    <button id="empty-actions-cart" class="empty-actions-cart">Vaciar carrito</button>
                    <div class="right-actions-cart">
                        <div class="total-actions-cart">
                            <p>Total</p>
                            <p id="total">$0</p>
                        </div>
                        <button id="whatsapp-actions-cart" class="whatsapp-actions-cart">
                            <i class="bi bi-whatsapp"></i> Consultar por WhatsApp
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="footer-brand">AquaticStore</p>
        <p class="footer-tagline">Equipamiento para nadadores</p>
        <div class="footer-social">
            <a href="https://www.instagram.com/_aquaticstore"
               class="footer-social-link"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Seguinos en Instagram">
                <i class="bi bi-instagram" aria-hidden="true"></i>
            </a>
        </div>
        <p class="footer-copy">&copy; 2026 AquaticStore</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/currency.js"></script>
    <script src="./js/discounts.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/menu.js"></script>
</body>
</html>
